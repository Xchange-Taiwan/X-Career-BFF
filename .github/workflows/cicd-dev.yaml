name: X-Career-BFF Pipeline

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Node dependencies (Serverless)
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Serverless configuration
        run: npx sls print --stage dev --region ${{ secrets.AWS_REGION }}
        env:
          STAGE: dev
          THE_REGION: ${{ secrets.AWS_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TABLE_CACHE: ${{ secrets.TABLE_CACHE }}
          XC_USER_BUCKET: ${{ secrets.XC_USER_BUCKET }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: npx sls deploy --stage dev --region ${{ secrets.AWS_REGION }}
        env:
          STAGE: dev
          THE_REGION: ${{ secrets.AWS_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TABLE_CACHE: ${{ secrets.TABLE_CACHE }}
          XC_USER_BUCKET: ${{ secrets.XC_USER_BUCKET }}

      # Block until Lambda's CloudFormation rollout has fully settled.
      # Without this, `update-function-configuration` below can race the
      # in-progress deploy and get its env vars overwritten when the
      # rollout finishes with serverless.yml's (smaller) environment block.
      - name: Wait for Lambda update to settle
        run: aws lambda wait function-updated --function-name x-career-bff-dev-app

      - name: Verify thumbnail Lambda is active
        run: aws lambda wait function-active --function-name x-career-bff-dev-avatar-thumb

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name x-career-bff-dev-app \
            --environment "Variables={
          DEFAULT_LANGUAGE=zh_TW,
          STAGE=dev,
          TESTING=dev,
          XC_USER_BUCKET=${{ secrets.XC_USER_BUCKET }},
          BATCH=10,
          REQUEST_INTERVAL_TTL=8,
          SHORT_TERM_TTL=1800,
          LONG_TERM_TTL=259200,
          JWT_ALGORITHM=HS256,
          ACCESS_TOKEN_TTL=1800,
          REFRESH_TOKEN_TTL=2592000,
          AUTH_RESPONSE_FIELDS=oauth_id;account_type;region;online,
          CACHE_TTL=300,
          TABLE_CACHE=${{ secrets.TABLE_CACHE }},
          AUTH_SERVICE_URL=${{ secrets.AUTH_SERVICE_URL }},
          USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }},
          SEARCH_SERVICE_URL=${{ secrets.SEARCH_SERVICE_URL }},
          FRONTEND_REDIRECT_URL=${{ secrets.FRONTEND_REDIRECT_URL }},
          MAX_WIDTH=300,
          MAX_HEIGHT=300,
          MAX_STORAGE_SIZE=15728640,
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},
          GOOGLE_OAUTH_SCOPES=${{ vars.GOOGLE_OAUTH_SCOPES }}
          }"
